<!DOCTYPE html>
<html>
<head>
    <title>Evaluasi Nilai Huruf</title>
</head>

<body>

    <h2>Program Evaluasi Nilai</h2>

    <!-- Input Nilai -->
    <label>Masukkan Nilai (0-100): </label>
    <input type="number" id="nilai">

    <!-- Tombol -->
    <button onclick="cekNilai()">Proses</button>

    <!-- Hasil -->
    <h3 id="hasil"></h3>

<script>

function cekNilai() {

    // Mengambil nilai dari input HTML
    var nilai = document.getElementById("nilai").value;

    var hasil;

    // Percabangan IF
    if (nilai >= 0 && nilai <= 20) {
        hasil = "E";
    }
    else if (nilai >= 21 && nilai <= 39) {
        hasil = "D";
    }
    else if (nilai >= 40 && nilai <= 64) {
        hasil = "C";
    }
    else if (nilai >= 65 && nilai <= 79) {
        hasil = "B";
    }
    else if (nilai >= 80 && nilai <= 100) {
        hasil = "A";
    }
    else {
        hasil = "Nilai tidak valid";
    }

    // Menampilkan hasil ke HTML
    document.getElementById("hasil").innerHTML =
        "Nilai Huruf : " + hasil;
}

</script>

</body>
</html>
